<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Link Shortener</title>
  <style>
    body {
      font-family: 'Arial';
      background: #f4f4f4;
      padding: 40px;
    }
    .box {
      background: white;
      padding: 20px;
      width: 400px;
      border-radius: 8px;
    }
    input, button {
    width: 100%;
    padding: 10px;
    box-sizing: border-box; 
    margin-bottom: 10px;
    }
    button {
    cursor: pointer;
    }
    #result {
      margin-top: 15px;
      word-break: break-all;
    }
    .error {
      color: red;
    }
    .success {
      color: #2e7d32;          /* green */
      background: #edf7ed;     /* light green background */
      border: 1px solid #c8e6c9;
      padding: 6px 8px;
      border-radius: 4px;
    }
 
  </style>
  <script>

/*
  Fetch and display all stored short links.
  Intended for visibility and testing.
 */
  async function getAllUrl() {
    const resultDiv = document.getElementById("result");

  resultDiv.classList.remove("error", "success");
  resultDiv.innerHTML = "";

    const res = await fetch("/allurl");
    const data = await res.json();

    resultDiv.innerHTML = ""; 

    data.forEach((row) => {
      const div = document.createElement("div");
      div.style.marginBottom = "10px";

      div.innerHTML = `
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <div>
       ${row.longlink} - [ <a href="/${row.shortlink}" target="_blank">
        ${row.shortlink}
      </a> ]
    </div>

    <a href="#"
       onclick="deleteShortLink(event, '${row.shortlink}')"
       style="color:red; font-size:12px; text-decoration:none;">
      <strong>Delete</strong>
    </a>
  </div>
  <hr>
`;

    resultDiv.appendChild(div);
  });
}

/*
  Sends user-defined shortcode and long URL
  to the backend and displays feedback.
*/
    async function shortenUrl() {
      const longUrl = document.getElementById("longUrl").value;
      const shortUrl = document.getElementById("customCode").value;
      const resultDiv = document.getElementById("result");
      
      resultDiv.classList.remove("error", "success");
      resultDiv.innerHTML = "";

      if (!longUrl) {
        resultDiv.innerText = "Please enter a URL";
        resultDiv.classList.add("error");
        return;
      }

      if (!shortUrl) {
        resultDiv.innerText = "Please enter a short code";
        resultDiv.classList.add("error");
        return;
      }

      try {
        const response = await fetch("/shorten", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ longUrl, shortUrl })
        });
        
        const data = await response.json();

        if (!response.ok) {
          resultDiv.innerText =  data.error;
          resultDiv.classList.add("error");
          return;
        }

        resultDiv.classList.add("success");
        resultDiv.innerHTML = `
          Short URL created successfully:<br>
          <a href="${data.shortUrl}" target="_blank">
            ${data.shortUrl}
          </a>
        `;
      } catch (err) {
        resultDiv.innerText = "Server not reachable"+err;
        resultDiv.classList.add("error");
      }
    }

    async function deleteShortLink(event, shortCode) {
      event.preventDefault(); // stop navigation
    
      if (!confirm("Delete short link " + shortCode +"?")) return;

      const password = prompt("Enter delete password:");
      if (!password) {
        alert("Delete cancelled: password required");
        return;
      }
      try {
        const res = await fetch("/delete/"+shortCode, {
          method: "DELETE",
          headers: {
            "Content-Type": "application/json"
       },
      body: JSON.stringify({ password })
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.err || "Delete failed-Check password");
        return;
      }

      alert("Short link deleted successfully");
      getAllUrl();
    } catch (err) {
      alert("Server not reachable");
    }
  }
  </script>
</head>

<body>

  <div class="box">
  <h2>Link Shortener</h2>

  <label>Long URL</label>
  <input
    type="text"
    id="longUrl"
    placeholder="https://www.google.com/very/long/link"
  />

  <label>Custom short code</label>
  <input
    type="text"
    id="customCode"
    placeholder="e.g. myGoogle-1"
  />

  <button class="primary" onclick="shortenUrl()">Create Short Link</button>

  <div class="divider"></div>

  <button class="secondary" onclick="getAllUrl()">Show All Links</button>

  <div id="result"></div>
</div>
<hr><div id="about" style="margin-top:15px; font-size:13px; color:#555;">

</div>
</body>
</html>
